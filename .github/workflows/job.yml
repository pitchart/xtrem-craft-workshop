name: CI Workflow

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

defaults:
  run:
    working-directory: ./typescript

jobs:
  quality-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: true

      - name: 'Lint'
        run: |
          pnpm eslint
        continue-on-error: true
      - name: 'Build'
        run: |
          pnpm run build
      - name: 'Testing'
        run: |
          pnpm run test
